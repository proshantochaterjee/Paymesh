[workspace]
resolver = "2"
members = [
    "common",
    "payroll-factory",
    "organization",
    "treasury",
    "employee-registry",
    "payroll-engine",
    "milestone-engine",
]


[workspace.package]
edition = "2021"
license = "MIT"

[workspace.dependencies]
soroban-sdk = "26.1.0"
common = { path = "common" }
organization = { path = "organization" }
treasury = { path = "treasury" }
payroll-factory = { path = "payroll-factory" }
employee-registry = { path = "employee-registry" }
# Pinned to the 2.x line: soroban-env-host 26.1.3 declares an unbounded
# `ed25519-dalek = ">=2.0.0"`, which lets Cargo resolve the incompatible
# 3.0.0 (its rand_core version doesn't satisfy soroban-env-host's
# ChaCha20Rng-based test PRNG). Only exercised via the `testutils` feature.
ed25519-dalek = "=2.2.0"

# Standard Soroban release profile: small, reproducible WASM.
[profile.release]
opt-level = "z"
overflow-checks = true
debug = 0
strip = "symbols"
debug-assertions = false
panic = "abort"
codegen-units = 1
lto = true

[profile.release-with-logs]
inherits = "release"
debug-assertions = true

