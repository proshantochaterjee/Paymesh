name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: workforceos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32v1-none

    - name: Install Stellar CLI
      run: |
        curl -L https://github.com/stellar/stellar-cli/releases/download/v22.0.0/stellar-cli-22.0.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
        sudo mv stellar /usr/local/bin/stellar

    - name: Provision Stellar test identity
      run: |
        for attempt in 1 2 3; do
          if stellar keys generate workforceos-deployer --network testnet --fund --overwrite; then
            exit 0
          fi
          sleep 5
        done
        exit 1

    - name: Prisma Generate
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/workforceos_test
      run: npm run db:generate --workspace=@workforceos/backend

    - name: Prisma Migrate
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/workforceos_test
      run: npm run db:deploy --workspace=@workforceos/backend

    - name: Run Linting
      run: npx turbo run lint

    - name: Run Type Checks
      run: npx turbo run typecheck

    - name: Run Tests
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/workforceos_test
        REDIS_URL: redis://localhost:6379
        STELLAR_NETWORK_PASSPHRASE: "Test SDF Network ; September 2015"
        STELLAR_RPC_URL: "https://soroban-testnet.stellar.org"
      run: npx turbo run test

    - name: Build Application
      env:
        DATABASE_URL: postgresql://postgres:password@localhost:5432/workforceos_test
      run: npx turbo run build
